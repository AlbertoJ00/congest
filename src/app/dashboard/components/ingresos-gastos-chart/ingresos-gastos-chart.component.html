<div class="panel">
  <div class="panel__header">
    <div class="panel__title-wrapper">
      <h2 class="panel__title">Ingresos vs Gastos</h2>
      <span class="panel__subtitle">Comportamiento de los últimos 6 meses</span>
    </div>
    <div class="panel__legend">
      <div class="legend-item">
        <span class="legend-dot legend-dot--ingresos"></span>
        Ingresos
      </div>
      <div class="legend-item">
        <span class="legend-dot legend-dot--gastos"></span>
        Gastos
      </div>
    </div>
  </div>

  <div class="chart-container" *ngIf="isLoaded">
    <canvas baseChart
      [data]="lineChartData"
      [options]="lineChartOptions"
      [type]="lineChartType">
    </canvas>
  </div>
</div>
