<header class="header">
  <div class="header__inner">
    <!-- Logo -->
    <div class="header__logo" (click)="navigateTo('/dashboard')">
      <img src="/img/logo.png" alt="Congest" class="header__logo-image">
    </div>

    <!-- Navegación central: pill selector -->
    <nav class="header__nav">
      <!-- Ícono layers (Dashboard) -->
      <button
        class="header__nav-icon"
        [class.active]="activeSection === 'Dashboard'"
        (click)="navigateTo('/dashboard')"
        title="Dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
      </button>

      <!-- Pill con sección activa -->
      <div class="header__pill">
        <button
          *ngFor="let section of sections"
          class="header__pill-item"
          [class.active]="activeSection === section.name"
          (click)="navigateTo(section.route)">
          <span class="header__pill-text">{{ section.name }}</span>
          <svg *ngIf="section.icon === 'building' && activeSection === section.name" class="header__pill-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="4" y="2" width="16" height="20" rx="2" ry="2"/>
            <path d="M9 22v-4h6v4"/>
            <path d="M8 6h.01M16 6h.01M12 6h.01M8 10h.01M16 10h.01M12 10h.01M8 14h.01M16 14h.01M12 14h.01"/>
          </svg>
          <svg *ngIf="section.icon === 'person' && activeSection === section.name" class="header__pill-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
      </div>

      <!-- Íconos secundarios -->
      <button class="header__nav-icon" (click)="navigateTo('/inquilinos')" title="Personas">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
    </nav>

    <!-- Perfil de usuario -->
    <div class="header__profile" *ngIf="currentUser">
      <div class="header__profile-info" (click)="openProfileModal()">
        <span class="header__profile-name">{{ getDisplayName(currentUser) }}</span>
        <span class="header__profile-role">{{ currentUser.rol }}</span>
      </div>
      <div class="header__profile-avatar avatar avatar--md avatar--color-1" (click)="openProfileModal()">
        {{ getInitials(getDisplayName(currentUser)) }}
      </div>
    </div>
  </div>
</header>

<div class="header__modal-backdrop" *ngIf="isProfileModalOpen" (click)="closeProfileModal()">
  <div class="header__modal" (click)="$event.stopPropagation()">
    <div class="header__modal-header">
      <div>
        <h3 class="header__modal-title">Editar perfil</h3>
        <p class="header__modal-subtitle">Actualiza tus datos personales en un solo lugar.</p>
      </div>
      <button type="button" class="header__modal-close" (click)="closeProfileModal()" aria-label="Cerrar modal">
        ×
      </button>
    </div>

    <form [formGroup]="profileForm" class="header__modal-form" (ngSubmit)="saveProfile()">
      <div class="header__modal-grid">
        <div class="header__modal-field">
          <label for="profile-nombre">Nombre</label>
          <input id="profile-nombre" type="text" formControlName="nombre" class="form-input">
          <span class="header__modal-error" *ngIf="profileForm.get('nombre')?.touched && profileForm.get('nombre')?.invalid">
            El nombre es obligatorio.
          </span>
        </div>

        <div class="header__modal-field">
          <label for="profile-apellido">Apellido</label>
          <input id="profile-apellido" type="text" formControlName="apellido" class="form-input">
        </div>

        <div class="header__modal-field header__modal-field--full">
          <label for="profile-email">Correo</label>
          <input id="profile-email" type="email" formControlName="email" class="form-input">
          <span class="header__modal-error" *ngIf="profileForm.get('email')?.touched && profileForm.get('email')?.hasError('required')">
            El correo es obligatorio.
          </span>
          <span class="header__modal-error" *ngIf="profileForm.get('email')?.touched && profileForm.get('email')?.hasError('email')">
            Ingresa un correo valido.
          </span>
        </div>

        <div class="header__modal-field header__modal-field--full">
          <label for="profile-telefono">Telefono</label>
          <input id="profile-telefono" type="text" formControlName="telefono" class="form-input">
        </div>
      </div>

      <div class="header__modal-actions">
        <button type="button" class="header__modal-secondary" (click)="logout()">Cerrar sesion</button>
        <div class="header__modal-actions-right">
          <button type="button" class="header__modal-secondary" (click)="closeProfileModal()">Cancelar</button>
          <button type="submit" class="btn-primary">Guardar cambios</button>
        </div>
      </div>
    </form>
  </div>
</div>
