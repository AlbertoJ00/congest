<header class="header">
  <div class="header__inner">
    <!-- Logo -->
    <div class="header__logo" (click)="navigateTo('/dashboard')">
      <img src="/img/logo.png" alt="Congest" class="header__logo-image">
    </div>

    <!-- Navegación central: pill selector -->
    <nav class="header__nav">
      <!-- Ícono layers (Dashboard) -->
      <button
        class="header__nav-icon"
        [class.active]="activeSection === 'Dashboard'"
        (click)="navigateTo('/dashboard')"
        title="Dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
      </button>

      <!-- Pill con sección activa -->
      <div class="header__pill">
        <button
          *ngFor="let section of sections"
          class="header__pill-item"
          [class.active]="activeSection === section.name"
          (click)="navigateTo(section.route)">
          <span class="header__pill-text">{{ section.name }}</span>
          <svg *ngIf="section.icon === 'building' && activeSection === section.name" class="header__pill-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="4" y="2" width="16" height="20" rx="2" ry="2"/>
            <path d="M9 22v-4h6v4"/>
            <path d="M8 6h.01M16 6h.01M12 6h.01M8 10h.01M16 10h.01M12 10h.01M8 14h.01M16 14h.01M12 14h.01"/>
          </svg>
          <svg *ngIf="section.icon === 'person' && activeSection === section.name" class="header__pill-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
      </div>

      <!-- Íconos secundarios -->
      <button class="header__nav-icon" (click)="navigateTo('/inquilinos')" title="Personas">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
    </nav>

    <!-- Perfil de usuario -->
    <div class="header__profile" *ngIf="currentUser">
      <div class="header__profile-info">
        <span class="header__profile-name">{{ currentUser.nombre }}</span>
        <span class="header__profile-role">{{ currentUser.rol }}</span>
      </div>
      <div class="header__profile-avatar avatar avatar--md avatar--color-1" (click)="logout()">
        {{ getInitials(currentUser.nombre) }}
      </div>
    </div>
  </div>
</header>
