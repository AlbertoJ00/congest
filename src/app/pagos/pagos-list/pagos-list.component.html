<app-header activeSection="Pagos"></app-header>

<div class="content-main-container">
  <div class="content-main">
    <main class="payments-page">
      <div class="page-header">
        <div class="page-header__titles">
          <h1 class="page-header__title">Finanzas de los condominios</h1>
          <p class="page-header__subtitle">Todas las actividades del sistema</p>
        </div>

        <div class="page-header__actions">
          <app-search-bar (searchChange)="onSearch($event)"></app-search-bar>
          <button class="btn-primary" type="button" (click)="openCreateModal()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="16"></line>
              <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
            Nuevo
          </button>
        </div>
      </div>

      <div class="table-container">
        <div class="table-responsive">
          <table class="table payments-table">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Concepto</th>
                <th>Categoría</th>
                <th>Tipo</th>
                <th>Monto</th>
                <th>Método</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let pago of filteredPagos">
                <td class="text-secondary">{{ pago.fecha }}</td>
                <td class="font-medium">{{ pago.concepto }}</td>
                <td><span [class]="getCategoryClass(pago.categoria)">{{ pago.categoria }}</span></td>
                <td><span [class]="getTypeClass(pago.tipo)">{{ pago.tipo }}</span></td>
                <td class="font-medium">${{ pago.monto | number }}</td>
                <td class="text-secondary">{{ pago.metodo }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

<app-entity-modal
  [open]="isCreateModalOpen"
  mode="pago"
  (close)="closeCreateModal()"
  (save)="handleCreatePago($event)">
</app-entity-modal>
